<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Y2K — 1999, 그날 밤</title>
<style>
  /* ============================================================
     Y2K Game — 허브 (에피소드 / 미니게임 선택)
     ============================================================ */
  :root {
    --bg-a:#1a2348; --bg-b:#2d1b3d;
    --neon:#3dff7e; --pink:#ff6ec7; --gold:#ffd84d;
    --card:#f4f1e8; --ink:#1a1a2e;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    background: linear-gradient(160deg, var(--bg-a), var(--bg-b));
    font-family:"DungGeunMo","Galmuri9","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:#fff; min-height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:24px 16px; overflow-x:hidden;
  }
  body::before { /* 스캔라인 */
    content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 3px);
  }
  .wrap { width:min(94vw, 440px); position:relative; z-index:2; }

  .logo { text-align:center; margin-bottom:6px; }
  .logo .y2k {
    font-size:clamp(56px,18vw,88px); font-weight:900; line-height:1;
    color:var(--neon); text-shadow:0 0 18px rgba(61,255,126,.6), 4px 4px 0 var(--pink);
    letter-spacing:2px;
  }
  .logo .sub { font-size:14px; color:var(--gold); letter-spacing:4px; margin-top:8px; }
  .logo .desc { font-size:12px; color:#b9c2e0; margin-top:10px; line-height:1.6; }

  .section-label {
    font-size:12px; color:var(--gold); letter-spacing:2px; margin:26px 0 12px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label::before, .section-label::after {
    content:""; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(255,216,77,.4),transparent);
  }

  .game-card {
    display:flex; align-items:center; gap:14px;
    background:var(--card); color:var(--ink);
    border-radius:14px; padding:14px 16px; margin-bottom:14px;
    text-decoration:none; cursor:pointer; position:relative;
    box-shadow:0 6px 0 rgba(0,0,0,.35), 0 10px 20px rgba(0,0,0,.3);
    transition: transform .1s, box-shadow .1s;
    border:3px solid #fff;
  }
  .game-card:active { transform: translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.35), 0 4px 10px rgba(0,0,0,.3); }
  .game-card .ep { font-size:11px; color:#888; }
  .game-card .icon {
    width:54px; height:54px; flex:0 0 auto; border-radius:12px;
    display:flex; align-items:center; justify-content:center; font-size:30px;
    box-shadow: inset 0 0 0 2px rgba(0,0,0,.1);
  }
  .game-card.g1 .icon { background:linear-gradient(135deg,#0a3d62,#3c6382); }
  .game-card.g2 .icon { background:linear-gradient(135deg,#fbe8cf,#f4d9a8); }
  .game-card .body { flex:1; min-width:0; }
  .game-card .title { font-size:15px; font-weight:bold; }
  .game-card .meta { font-size:11px; color:#777; margin-top:3px; line-height:1.5; }
  .game-card .go { font-size:20px; color:var(--accent,#e8743b); flex:0 0 auto; }

  .game-card.locked { opacity:.55; cursor:default; pointer-events:none; }
  .game-card.locked .icon { background:#9aa0b0; filter:grayscale(.6); }
  .badge {
    position:absolute; top:-9px; right:10px; font-size:10px; font-weight:bold;
    background:var(--pink); color:#fff; padding:2px 8px; border-radius:10px;
    box-shadow:0 2px 4px rgba(0,0,0,.3);
  }
  .badge.soon { background:#6c7a99; }

  .footer { text-align:center; margin-top:24px; font-size:11px; color:#7c85a8; line-height:1.7; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="y2k">Y2K</div>
      <div class="sub">1 9 9 9 ,  그 날  밤</div>
      <div class="desc">2000년이 오면 세상이 멈춘다고 했다.<br>그날 밤, 우리 가족의 이야기.</div>
    </div>

    <div class="section-label">EPISODE 1 — 비상의 밤</div>

    <a class="game-card g1" href="pipe.html">
      <span class="badge">PLAY</span>
      <div class="icon">🖥️</div>
      <div class="body">
        <div class="ep">미니게임 1 · 회사</div>
        <div class="title">회선 복구 작전</div>
        <div class="meta">자정까지 끊긴 회선을 복구하라<br>파이프 연결 퍼즐</div>
      </div>
      <div class="go">▶</div>
    </a>

    <a class="game-card g2" href="card.html">
      <span class="badge">PLAY</span>
      <div class="icon">📦</div>
      <div class="body">
        <div class="ep">미니게임 2 · 집</div>
        <div class="title">비상식량 정리 대작전</div>
        <div class="meta">쏟아진 비상식량의 짝을 맞춰라<br>카드 뒤집기</div>
      </div>
      <div class="go">▶</div>
    </a>

    <div class="game-card locked">
      <span class="badge soon">준비중</span>
      <div class="icon">🎬</div>
      <div class="body">
        <div class="ep">스토리 모드</div>
        <div class="title">에피소드 1 전체 플레이</div>
        <div class="meta">만화 컷 + 미니게임 + 엔딩 분기<br>(개발 예정)</div>
      </div>
    </div>

    <div class="footer">
      Y2K Game — 프로토타입<br>
      1999년 ~ 2010년 대한민국 · 향수 퍼즐 게임
    </div>
  </div>
</body>
</html>
